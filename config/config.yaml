# TrendRadar 配置文件
# 详细说明请参考：https://github.com/sansan0/TrendRadar

# ==================== 基础设置 ====================
# 时区（使用 IANA 时区名称）
timezone: "Asia/Shanghai"

# 每日报告生成时间（24小时制，HH:MM）
daily_report_time: "09:00"

# 关键词文件路径（相对于项目根目录）
keyword_file: "config/frequency_words.txt"

# ==================== 通知渠道配置 ====================
notification:
  # ---------- 钉钉 ----------
  # dingtalk:
  #   webhook_url: "https://oapi.dingtalk.com/robot/send?access_token=22c12e410287eaa2a31cbe308e3fedcea6b16b5242a7a3dee386ab299e207f4f"
  #   secret: "你的加签密钥（如有）"
  #   msg_type: "text"

# ==================== 高级设置（可选） ====================
# 去重天数（同一标题在N天内不重复推送）
deduplicate_days: 7

# 最大推送条数（每次最多推送多少条）
max_items: 20

# 是否启用代理（如果需要）
# proxy: "http://127.0.0.1:7890"

# 关键词匹配模式：
# - "any"  : 包含任一关键词即推送（默认）
# - "all"  : 必须包含所有关键词才推送
# - "exact": 完全匹配关键词（精确短语）
match_mode: "any"

# 要监控的平台（留空表示全部平台，可指定如 ["weibo", "zhihu"]）
# 支持平台列表：weibo, zhihu, bilibili, douyin, xiaohongshu, wechat, baidu, etc.
platforms: []
